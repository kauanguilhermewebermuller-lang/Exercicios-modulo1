<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modelo de caixas</title>
    <style>
        h1 {
            background-color: lightgrey;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: darkgreen;

            border: 10px solid darkgreen; /* forma abreviada de escrever as propriedades de borda */



            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            padding: 10px 10px 10px 10px; /* forma abreviada de escrever as propriedades de padding */



            margin-block-end: 10px;
            margin-right: 10px;
            margin-bottom: 45px;
            margin-left: 10px;

            margin: 10px 10px 45px 10px; /* forma abreviada de escrever as propriedades de margin */



            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;

            outline: 5px dashed salmon; /* forma abreviada de escrever as propriedades de outline */


        }
        a {
            border-width: 10px;
            border-style: double;
            border-color: red;

            padding-top: 30px;
            padding-right: 15px;
            padding-bottom: 30px;
            padding-left: 15px;
            
        }
        a#part {
            margin: 4px
            padding: 8px;
            border-style: none;
            
        }
        


    </style>
    
</head>
<body>
    <h1>exemplo de caixa box-level</h1>
    <p>paragrafos tambem sao exemplos de box level mas os <a href="#">links sao exemplos de caixas inline-level</a>. vamos ver co tudo isso funciona.</p>
    <a id="part" href="caixa02.html">link para caixa 02</a>
    

</body>
</html>
