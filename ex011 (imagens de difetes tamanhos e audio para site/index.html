<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>midias em html5</title>
</head>
<body>
    <h1>imagem dinamica</h1>
    <p>Esta é uma página que mostra uma imagem que muda conforme o tamanho da tela. para varios dispositivos</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexível">
    </picture>
    <h1>Reproduzindo audio</h1>
    <p>audios em htm5</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/guanacast.mp3" type="audio/mpeg">
        <source src="midia/guanacast.ogg" type="audio/ogg"> <!-- tem o OGG mas é muito pesado NAO USE-->
        <p>Seu navegador não suporta o elemento de áudio. 
        <a href="midia/guanacast.mp3">Baixe o áudio aqui.</a></p>
    </audio>
        </p>

</body>
</html>
