<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: aqua;
        }
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color:rgb(0, 0, 255);
        }
        a:hover {
            color: rgb(0, 0, 0);
            text-decoration: underline;
        }
        a:active {
            color: rgb(255, 255, 255);
        }
        h1 {
            text-align: center;
            text-decoration: underline;
        }
        h1:hover {
            color: rgb(255, 255, 255);
        }
        .especial::after  {
            content: "⇚";
            font-size: 0.8em;
            color: rgb(212, 78, 78);
            font-weight: normal;
            text-decoration: underline;
        }
        .especial::before {
            content: "⇛";
            font-size: 0.8em;
            color: rgb(212, 78, 78);
            font-weight: normal;
            text-decoration: underline;
        }
        .especial{
            background-color: rgb(219, 123, 123);
            text-decoration: line-through;
        }



    </style>
</head>
<body>
    <h1>personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">repositorio github</a></li>
        <li><a href="https://youtube.com/cursoemvideo" target="_blank" class="especial">canal youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">site do curso em video</a></li>
    </ul>
    
</body>
</html>
